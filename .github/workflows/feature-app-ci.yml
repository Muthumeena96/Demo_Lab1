name: Feature App CI

on:
  push:
    branches:
      - 'feature/**'
    paths:
      - 'app/**'
      - '!docs/**'
      - '!**/*.md'

env:
  NODE_ENV: ci

jobs:
  test-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show NODE_ENV
        run: echo "NODE_ENV is $NODE_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
